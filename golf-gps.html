<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Golf GPS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #2d6a4f; --green-light: #40916c; --green-pale: #d8f3dc;
      --fairway: #52b788; --sand: #e9c46a; --sky: #1a1a2e;
      --panel: #0f2027; --panel2: #162636; --text: #e8f5e9;
      --muted: #7aab8a; --accent: #95d5b2; --red: #e76f51;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--sky); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    /* COURSE SCREEN */
    #course-screen { position: fixed; inset: 0; background: var(--sky); z-index: 5000; display: flex; flex-direction: column; padding: 28px 20px 20px; gap: 14px; }
    #course-screen h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 4px; color: var(--fairway); }
    #course-screen p { color: var(--muted); font-size: .85rem; margin-top: -6px; }
    .search-row { display: flex; gap: 8px; }
    #course-search-input { flex: 1; background: var(--panel2); border: 1px solid rgba(149,213,178,.25); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: .95rem; padding: 11px 14px; }
    #course-search-input::placeholder { color: var(--muted); }
    #course-search-input:focus { outline: none; border-color: var(--fairway); }
    #course-results { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    #course-status { text-align: center; color: var(--muted); font-size: .82rem; padding: 20px 0; }
    #course-status.error { color: var(--red); }
    .course-card { background: var(--panel2); border: 1px solid rgba(149,213,178,.12); border-radius: 10px; padding: 12px 14px; cursor: pointer; }
    .course-card:active { border-color: var(--fairway); background: rgba(82,183,136,.1); }
    .course-card .cname { font-weight: 500; font-size: .9rem; }
    .course-card .cloc { font-size: .75rem; color: var(--muted); margin-top: 3px; }
    .course-card .choles { font-size: .72rem; color: var(--accent); margin-top: 4px; }
    #btn-skip { background: none; border: 1px solid rgba(149,213,178,.15); color: var(--muted); border-radius: 10px; padding: 10px; font-family: 'DM Sans', sans-serif; font-size: .82rem; cursor: pointer; }

    /* HEADER */
    header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--panel); border-bottom: 1px solid rgba(149,213,178,.15); flex-shrink: 0; }
    header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 3px; color: var(--fairway); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 62vw; }
    .hole-badge { background: var(--green); border-radius: 8px; padding: 4px 12px; font-size: .75rem; font-weight: 500; color: var(--green-pale); letter-spacing: 1px; white-space: nowrap; }

    /* DIST BAR */
    #dist-bar { background: var(--panel2); display: flex; justify-content: space-around; padding: 8px 12px; border-bottom: 1px solid rgba(149,213,178,.1); flex-shrink: 0; }
    .dist-item { text-align: center; }
    .dist-label { font-size: .6rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 2px; }
    .dist-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--accent); line-height: 1; }
    .dist-value.big { color: var(--sand); font-size: 2rem; }
    .dist-unit { font-size: .6rem; color: var(--muted); text-transform: uppercase; }

    /* MAP */
    #map { flex: 1; min-height: 0; }
    .leaflet-container { background: #1a2e1a; }

    /* TOOLBAR */
    #toolbar { background: var(--panel); padding: 10px 12px; display: flex; gap: 8px; align-items: center; border-top: 1px solid rgba(149,213,178,.1); flex-shrink: 0; overflow-x: auto; }
    button { border: none; cursor: pointer; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: .78rem; transition: all .15s; white-space: nowrap; }
    .btn-p { background: var(--green); color: var(--green-pale); padding: 8px 14px; }
    .btn-p:active { transform: scale(.97); }
    .btn-s { background: rgba(149,213,178,.1); color: var(--accent); border: 1px solid rgba(149,213,178,.2); padding: 8px 14px; }
    .btn-d { background: rgba(231,111,81,.15); color: var(--red); border: 1px solid rgba(231,111,81,.25); padding: 8px 14px; }
    .spacer { flex: 1; }

    /* SCORECARD */
    #sc-panel { position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel); border-top: 2px solid var(--green-light); border-radius: 16px 16px 0 0; padding: 16px; transform: translateY(100%); transition: transform .3s ease; z-index: 2000; max-height: 72dvh; overflow-y: auto; }
    #sc-panel.open { transform: translateY(0); }
    #sc-panel h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 2px; color: var(--fairway); margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
    #sc-panel h2 button { font-size: 1rem; background: none; color: var(--muted); padding: 0 6px; }
    #sc-course { font-size: .75rem; color: var(--muted); margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    thead tr { border-bottom: 1px solid rgba(149,213,178,.2); }
    th { text-align: center; padding: 6px 4px; font-size: .65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 500; }
    td { text-align: center; padding: 5px 4px; border-bottom: 1px solid rgba(255,255,255,.04); }
    td:first-child { color: var(--muted); font-size: .75rem; }
    .score-cell input { width: 36px; height: 32px; background: rgba(149,213,178,.08); border: 1px solid rgba(149,213,178,.15); border-radius: 6px; color: var(--text); text-align: center; font-size: .9rem; font-family: 'Bebas Neue', sans-serif; }
    .score-cell input:focus { outline: none; border-color: var(--fairway); }
    .birdie { color: #4ade80; } .par { color: var(--text); } .bogey { color: var(--sand); } .double { color: var(--red); }
    #total-row td { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--accent); border-top: 1px solid rgba(149,213,178,.2); padding-top: 8px; }

    /* TOAST */
    #toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-10px); background: var(--green); color: var(--green-pale); padding: 8px 18px; border-radius: 20px; font-size: .8rem; font-weight: 500; opacity: 0; transition: all .3s; z-index: 6000; pointer-events: none; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* MARKERS */
    .pin-you { width: 16px; height: 16px; background: var(--fairway); border: 3px solid #fff; border-radius: 50%; box-shadow: 0 0 0 4px rgba(82,183,136,.3); }
    .pin-target { width: 14px; height: 14px; background: var(--sand); border: 2px solid #fff; border-radius: 50%; }
  </style>
</head>
<body>

<!-- COURSE SEARCH -->
<div id="course-screen">
  <h1>⛳ Golf GPS</h1>
  <p>Search for your course to load real pars</p>
  <div class="search-row">
    <input type="text" id="course-search-input" placeholder="e.g. Scrabo Golf Club" autocomplete="off" />
    <button class="btn-p" id="btn-search">Search</button>
  </div>
  <div id="course-results">
    <div id="course-status">Enter a course name to search</div>
  </div>
  <button id="btn-skip">Skip — use default pars (Par 4 every hole)</button>
</div>

<!-- MAIN APP -->
<header>
  <h1 id="hdr-title">⛳ Golf GPS</h1>
  <span class="hole-badge" id="hdr-hole">Hole 1 · Par 4</span>
</header>

<div id="dist-bar">
  <div class="dist-item">
    <div class="dist-label">To Target</div>
    <div class="dist-value big" id="dist-target">—</div>
    <div class="dist-unit">yards</div>
  </div>
  <div class="dist-item">
    <div class="dist-label">Accuracy</div>
    <div class="dist-value" id="dist-acc">—</div>
    <div class="dist-unit">metres</div>
  </div>
  <div class="dist-item">
    <div class="dist-label">Shots</div>
    <div class="dist-value" id="dist-shots">0</div>
    <div class="dist-unit">this hole</div>
  </div>
</div>

<div id="map"></div>

<div id="toolbar">
  <button class="btn-p" id="btn-locate">📍 Find Me</button>
  <button class="btn-s" id="btn-clear">Clear Pin</button>
  <button class="btn-s" id="btn-shot">＋ Shot</button>
  <div class="spacer"></div>
  <button class="btn-s" id="btn-prev">◀</button>
  <button class="btn-s" id="btn-next">▶</button>
  <button class="btn-p" id="btn-card">📋 Card</button>
  <button class="btn-s" id="btn-course">⛳</button>
</div>

<!-- SCORECARD -->
<div id="sc-panel">
  <h2>Scorecard <button id="btn-close-card">✕</button></h2>
  <div id="sc-course"></div>
  <table>
    <thead><tr><th>Hole</th><th>Par</th><th>Score</th><th>+/−</th></tr></thead>
    <tbody id="sc-body"></tbody>
    <tfoot><tr id="total-row"><td>Total</td><td id="t-par">—</td><td id="t-score">—</td><td id="t-diff">—</td></tr></tfoot>
  </table>
  <br/>
  <button class="btn-d" id="btn-reset" style="width:100%;padding:10px">Reset Round</button>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

// ── API KEY — replace this with your key from golfcourseapi.com ──────────────
const API_KEY = 'YOUR_API_KEY_HERE';

// ── STATE ────────────────────────────────────────────────────────────────────
let G = {
  holes: 18,
  pars:  Array(18).fill(4),
  scores: Array(18).fill(null),
  shots:  Array(18).fill(0),
  hole: 1,
  userPos: null,
  targetPos: null,
  courseName: ''
};

// ── COURSE SEARCH ────────────────────────────────────────────────────────────
async function searchCourses(query) {
  const resultsEl = document.getElementById('course-results');
  resultsEl.innerHTML = '<div id="course-status">Searching…</div>';

  try {
    const target = `https://api.golfcourseapi.com/v1/search?search_query=${encodeURIComponent(query)}&key=${API_KEY}`;
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error('Network error ' + res.status);
    const wrapper = await res.json();
    const data = JSON.parse(wrapper.contents);
    const clubs = data.clubs || [];

    if (clubs.length === 0) {
      resultsEl.innerHTML = '<div id="course-status" class="error">No courses found — try a different name</div>';
      return;
    }

    resultsEl.innerHTML = '';
    clubs.slice(0, 15).forEach(club => {
      const card = document.createElement('div');
      card.className = 'course-card';
      const loc = [club.city, club.state, club.country].filter(Boolean).join(', ');
      const holes = club.number_of_holes || '18';
      card.innerHTML = `<div class="cname">${club.club_name}</div><div class="cloc">${loc}</div><div class="choles">${holes} holes</div>`;
      card.addEventListener('click', () => loadCourse(club));
      resultsEl.appendChild(card);
    });

  } catch (err) {
    resultsEl.innerHTML = `<div id="course-status" class="error">Search failed: ${err.message}</div>`;
  }
}

async function loadCourse(club) {
  toast('Loading ' + club.club_name + '…');
  try {
    const clubId = club.club_id || club.id;
    const target = `https://api.golfcourseapi.com/v1/clubs/${clubId}?key=${API_KEY}`;
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;
    const res = await fetch(proxyUrl);
    const wrapper = await res.json();
    const data = JSON.parse(wrapper.contents);

    let pars = [];
    const courses = data.club?.courses || [];
    for (const course of courses) {
      const holes = course.holes || [];
      if (holes.length > 0) {
        pars = holes
          .sort((a, b) => (a.hole_number || 0) - (b.hole_number || 0))
          .map(h => parseInt(h.par) || 4);
        break;
      }
    }

    startRound(club.club_name, parseInt(club.number_of_holes) || 18, pars);

  } catch (err) {
    startRound(club.club_name, parseInt(club.number_of_holes) || 18, []);
  }
}

function startRound(name, numHoles, pars) {
  G.courseName = name;
  G.holes = numHoles || 18;
  G.pars = (pars.length === G.holes) ? pars : Array(G.holes).fill(4);
  G.scores = Array(G.holes).fill(null);
  G.shots  = Array(G.holes).fill(0);
  document.getElementById('hdr-title').textContent = '⛳ ' + name;
  document.getElementById('sc-course').textContent = name;
  document.getElementById('course-screen').style.display = 'none';
  setHole(1);
  toast(name + ' loaded — ' + G.holes + ' holes');
}

function skipCourse() {
  G.holes = 18; G.pars = Array(18).fill(4);
  G.scores = Array(18).fill(null); G.shots = Array(18).fill(0);
  G.courseName = 'Custom Round';
  document.getElementById('course-screen').style.display = 'none';
  document.getElementById('sc-course').textContent = 'Custom Round';
  setHole(1);
  toast('Using default pars');
}

document.getElementById('btn-search').addEventListener('click', () => {
  const q = document.getElementById('course-search-input').value.trim();
  if (q.length >= 2) searchCourses(q);
});
document.getElementById('course-search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-search').click();
});
document.getElementById('btn-skip').addEventListener('click', skipCourse);
document.getElementById('btn-course').addEventListener('click', () => {
  document.getElementById('sc-panel').classList.remove('open');
  document.getElementById('course-screen').style.display = 'flex';
  document.getElementById('course-results').innerHTML = '<div id="course-status">Enter a course name to search</div>';
  document.getElementById('course-search-input').value = '';
});

// ── MAP ──────────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([54.5, -4], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 20 }).addTo(map);
L.control.zoom({ position: 'topright' }).addTo(map);
const userIcon   = L.divIcon({ className: '', html: '<div class="pin-you"></div>',    iconSize: [16,16], iconAnchor: [8,8] });
const targetIcon = L.divIcon({ className: '', html: '<div class="pin-target"></div>', iconSize: [14,14], iconAnchor: [7,7] });
let userMarker = null, targetMarker = null;

// ── GPS ──────────────────────────────────────────────────────────────────────
let watchId = null;
function startGPS() {
  if (!navigator.geolocation) { toast('GPS not supported'); return; }
  toast('Locating…');
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  watchId = navigator.geolocation.watchPosition(pos => {
    const { latitude: lat, longitude: lng, accuracy } = pos.coords;
    G.userPos = { lat, lng };
    document.getElementById('dist-acc').textContent = Math.round(accuracy);
    if (!userMarker) {
      userMarker = L.marker([lat, lng], { icon: userIcon }).addTo(map);
      map.setView([lat, lng], 17);
      toast('GPS locked ✓');
    } else {
      userMarker.setLatLng([lat, lng]);
    }
    updateDist();
  }, err => toast('GPS: ' + err.message), { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 });
}

// ── DISTANCE ─────────────────────────────────────────────────────────────────
function yards(la1, lo1, la2, lo2) {
  const R = 6371000, dL = (la2-la1)*Math.PI/180, dO = (lo2-lo1)*Math.PI/180;
  const a = Math.sin(dL/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * 1.09361);
}
function updateDist() {
  if (G.userPos && G.targetPos) {
    document.getElementById('dist-target').textContent = yards(G.userPos.lat, G.userPos.lng, G.targetPos.lat, G.targetPos.lng).toLocaleString();
  } else {
    document.getElementById('dist-target').textContent = '—';
  }
}

map.on('click', e => {
  document.getElementById('sc-panel').classList.remove('open');
  G.targetPos = e.latlng;
  if (!targetMarker) {
    targetMarker = L.marker(e.latlng, { icon: targetIcon }).bindTooltip('', { permanent: true, direction: 'top' }).addTo(map);
  } else {
    targetMarker.setLatLng(e.latlng);
  }
  updateDist();
  if (G.userPos) targetMarker.setTooltipContent(yards(G.userPos.lat, G.userPos.lng, e.latlng.lat, e.latlng.lng) + ' yds');
});

// ── SCORECARD ────────────────────────────────────────────────────────────────
function buildCard() {
  const tbody = document.getElementById('sc-body');
  tbody.innerHTML = '';
  let tp = 0, ts = 0, hasScore = false;
  for (let h = 1; h <= G.holes; h++) {
    const par = G.pars[h-1] || 4;
    const score = G.scores[h-1];
    tp += par;
    if (score !== null) { ts += score; hasScore = true; }
    const diff = score !== null ? score - par : null;
    let dl = '—', dc = '';
    if (diff !== null) {
      if (diff <= -2)      { dl = '−2';    dc = 'birdie'; }
      else if (diff === -1){ dl = 'Birdie'; dc = 'birdie'; }
      else if (diff ===  0){ dl = 'Par';   dc = 'par'; }
      else if (diff ===  1){ dl = '+1';    dc = 'bogey'; }
      else                 { dl = '+'+diff; dc = 'double'; }
    }
    const row = document.createElement('tr');
    if (h === G.hole) row.style.background = 'rgba(82,183,136,.08)';
    row.innerHTML = `<td>${h}</td><td>${par}</td><td class="score-cell"><input type="number" min="1" max="15" value="${score ?? ''}" placeholder="${par}" data-hole="${h}"/></td><td class="${dc}">${dl}</td>`;
    tbody.appendChild(row);
  }
  document.getElementById('t-par').textContent = tp;
  document.getElementById('t-score').textContent = hasScore ? ts : '—';
  const diff = ts - tp;
  document.getElementById('t-diff').textContent = hasScore ? (diff === 0 ? 'E' : (diff > 0 ? '+'+diff : diff)) : '—';
  tbody.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('change', e => {
      const h = parseInt(e.target.dataset.hole), v = parseInt(e.target.value);
      G.scores[h-1] = isNaN(v) ? null : v;
      buildCard();
    });
  });
}

// ── HOLE NAV ─────────────────────────────────────────────────────────────────
function setHole(h) {
  G.hole = Math.max(1, Math.min(G.holes, h));
  const par = G.pars[G.hole-1] || 4;
  document.getElementById('hdr-hole').textContent = `Hole ${G.hole} · Par ${par}`;
  document.getElementById('dist-shots').textContent = G.shots[G.hole-1];
  if (targetMarker) { map.removeLayer(targetMarker); targetMarker = null; }
  G.targetPos = null; updateDist();
  toast(`Hole ${G.hole} — Par ${par}`);
}

// ── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── TOOLBAR EVENTS ───────────────────────────────────────────────────────────
document.getElementById('btn-locate').addEventListener('click', startGPS);
document.getElementById('btn-clear').addEventListener('click', () => {
  if (targetMarker) { map.removeLayer(targetMarker); targetMarker = null; }
  G.targetPos = null; updateDist(); toast('Pin cleared');
});
document.getElementById('btn-shot').addEventListener('click', () => {
  G.shots[G.hole-1]++;
  G.scores[G.hole-1] = G.shots[G.hole-1];
  document.getElementById('dist-shots').textContent = G.shots[G.hole-1];
  toast('Shot ' + G.shots[G.hole-1] + ' logged');
});
document.getElementById('btn-prev').addEventListener('click', () => setHole(G.hole - 1));
document.getElementById('btn-next').addEventListener('click', () => setHole(G.hole + 1));
document.getElementById('btn-card').addEventListener('click', () => { buildCard(); document.getElementById('sc-panel').classList.add('open'); });
document.getElementById('btn-close-card').addEventListener('click', () => document.getElementById('sc-panel').classList.remove('open'));
document.getElementById('btn-reset').addEventListener('click', () => {
  if (confirm('Reset the whole round?')) {
    G.scores = Array(G.holes).fill(null); G.shots = Array(G.holes).fill(0);
    setHole(1); toast('Round reset');
  }
});

</script>
</body>
</html>
